<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0d0520"/>
      <stop offset="50%" stop-color="#1a0636"/>
      <stop offset="100%" stop-color="#07030f"/>
    </linearGradient>
    <linearGradient id="grad-title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7B2FBE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Grille terminale -->
  <line x1="0" y1="52"  x2="1200" y2="52"  stroke="#7B2FBE" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="0" y1="104" x2="1200" y2="104" stroke="#7B2FBE" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="0" y1="156" x2="1200" y2="156" stroke="#7B2FBE" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="0" y1="208" x2="1200" y2="208" stroke="#7B2FBE" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="52"  y1="0" x2="52"  y2="280" stroke="#7B2FBE" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="104" y1="0" x2="104" y2="280" stroke="#7B2FBE" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="156" y1="0" x2="156" y2="280" stroke="#7B2FBE" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="260" y1="0" x2="260" y2="280" stroke="#7B2FBE" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Halo violet derrière la mascotte -->
  <ellipse cx="168" cy="140" rx="105" ry="105" fill="url(#halo)"/>

  <!-- Cercle fond blanc -->
  <circle cx="168" cy="140" r="72" fill="#FFFFFF"/>

  <!-- Mascotte oiseau vert — éléments directs avec transform (sans clipPath, compatible GitHub) -->
  <!-- transform : centre l'oiseau (cx=340,cy=283) sur (168,140), scale 0.28 -->
  <g transform="translate(168,140) scale(0.28) translate(-340,-283)">
    <!-- Plumes -->
    <ellipse cx="340" cy="104" rx="14" ry="29" fill="#1E5C3A"/>
    <ellipse cx="313" cy="114" rx="12" ry="25" fill="#1E5C3A" transform="rotate(-26 313 114)"/>
    <ellipse cx="367" cy="114" rx="12" ry="25" fill="#1E5C3A" transform="rotate(26 367 114)"/>
    <!-- Pattes -->
    <line x1="314" y1="404" x2="314" y2="436" stroke="#E0A23C" stroke-width="9" stroke-linecap="round"/>
    <line x1="366" y1="404" x2="366" y2="436" stroke="#E0A23C" stroke-width="9" stroke-linecap="round"/>
    <!-- Pieds -->
    <ellipse cx="308" cy="445" rx="24" ry="12" fill="#E0A23C"/>
    <ellipse cx="372" cy="445" rx="24" ry="12" fill="#E0A23C"/>
    <!-- Corps -->
    <ellipse cx="340" cy="272" rx="140" ry="150" fill="#1E5C3A"/>
    <!-- Ventre -->
    <ellipse cx="340" cy="298" rx="108" ry="120" fill="#F3F4EF"/>
    <!-- Ailes -->
    <path d="M 292 336 C 272 346, 266 384, 281 410 C 300 388, 306 354, 292 336 Z" fill="#1E5C3A"/>
    <path d="M 388 336 C 408 346, 414 384, 399 410 C 380 388, 374 354, 388 336 Z" fill="#1E5C3A"/>
    <!-- Yeux gauche -->
    <circle cx="300" cy="262" r="21" fill="#1C2A22"/>
    <circle cx="293" cy="254" r="7"  fill="#FFFFFF"/>
    <circle cx="308" cy="267" r="3.2" fill="#FFFFFF"/>
    <!-- Yeux droit -->
    <circle cx="380" cy="262" r="21" fill="#1C2A22"/>
    <circle cx="373" cy="254" r="7"  fill="#FFFFFF"/>
    <circle cx="388" cy="267" r="3.2" fill="#FFFFFF"/>
    <!-- Joues -->
    <circle cx="268" cy="314" r="17" fill="#E0A23C" opacity="0.5"/>
    <circle cx="412" cy="314" r="17" fill="#E0A23C" opacity="0.5"/>
    <!-- Bec -->
    <polygon points="340,334 322,307 358,307" fill="#E0A23C" stroke="#E0A23C" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- Séparateur -->
  <line x1="280" y1="60" x2="280" y2="220" stroke="#7B2FBE" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Eyebrow -->
  <circle cx="304" cy="88" r="4" fill="#4ade80"/>
  <text x="316" y="93" font-family="monospace" font-size="12" fill="#c084fc" letter-spacing="2" font-weight="700">PURPLE TEAM OPERATIONS CENTER</text>

  <!-- Titre -->
  <text x="302" y="148" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="url(#grad-title)">PurpleForge</text>
  <text x="302" y="193" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.55)" letter-spacing="1">Compagnon</text>

  <!-- Tagline -->
  <text x="302" y="232" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">MITRE ATT&amp;CK coverage · Sigma rules · Purple team campaigns</text>

  <!-- Badges -->
  <rect x="870" y="98"  width="90"  height="24" rx="12" fill="#3776ab" fill-opacity="0.85"/>
  <text x="915"  y="114" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="600">Python 3.12</text>

  <rect x="970" y="98"  width="80"  height="24" rx="12" fill="#009688" fill-opacity="0.85"/>
  <text x="1010" y="114" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="600">FastAPI</text>

  <rect x="1060" y="98" width="68"  height="24" rx="12" fill="#3d72d7" fill-opacity="0.85"/>
  <text x="1094" y="114" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="600">HTMX</text>

  <rect x="870" y="134" width="108" height="24" rx="12" fill="#4ade80" fill-opacity="0.15"/>
  <rect x="870" y="134" width="108" height="24" rx="12" fill="none" stroke="#4ade80" stroke-opacity="0.6" stroke-width="1"/>
  <text x="924"  y="150" font-family="Arial, sans-serif" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="600">64 tests ✓</text>

  <rect x="988" y="134" width="68"  height="24" rx="12" fill="#E0A23C" fill-opacity="0.15"/>
  <rect x="988" y="134" width="68"  height="24" rx="12" fill="none" stroke="#E0A23C" stroke-opacity="0.6" stroke-width="1"/>
  <text x="1022" y="150" font-family="Arial, sans-serif" font-size="11" fill="#E0A23C" text-anchor="middle" font-weight="600">MIT</text>

  <!-- Ligne bas -->
  <line x1="0" y1="272" x2="1200" y2="272" stroke="url(#grad-title)" stroke-opacity="0.3" stroke-width="2"/>
</svg>
