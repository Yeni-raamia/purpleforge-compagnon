<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- Rend la page lisible sur téléphone comme sur ordinateur (responsive). -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PurpleForge Compagnon{% endblock %}</title>

  <!-- Notre feuille de style (la charte graphique violette). -->
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">

  <!-- HTMX : permet l'interactivité sans recharger la page. On l'utilisera dès la Phase 1. -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <!-- En-tête commun à toutes les pages. -->
  <header class="app-header">
    <div class="app-header__inner">
      <span class="app-logo">PurpleForge<span class="app-logo__accent"> Compagnon</span></span>
      <nav class="app-nav">
        <a href="/">Accueil</a>
      </nav>
    </div>
  </header>

  <!-- Contenu propre à chaque page : il se glisse ici. -->
  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <!-- Pied de page commun. -->
  <footer class="app-footer">
    <p>PurpleForge Compagnon — outil open-source de purple teaming.</p>
  </footer>
</body>
</html>
