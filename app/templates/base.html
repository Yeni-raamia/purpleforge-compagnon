<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PurpleForge Compagnon{% endblock %}</title>

  <!-- Polices de la famille Outils Compagnon -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Charte graphique PurpleForge -->
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">

  <!-- HTMX : interactivité sans rechargement de page -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>

  <!-- ═══ NAVIGATION ════════════════════════════════════════════════════════ -->
  <header class="app-header">
    <div class="app-header__inner">

      <!-- Logo avec mascotte -->
      <a href="/" class="app-logo">
        <span class="app-logo__mascot" aria-hidden="true"></span>
        <span class="app-logo__text">
          Purple<span class="app-logo__accent">Forge</span>
          <small class="app-logo__suite">Compagnon</small>
        </span>
      </a>

      <!-- Navigation principale -->
      <nav class="app-nav" aria-label="Navigation principale">
        <a href="/" class="app-nav__link">Accueil</a>
        <a href="/campaigns/" class="app-nav__link app-nav__link--cta">
          Campagnes
        </a>
      </nav>

    </div>
  </header>

  <!-- ═══ CONTENU ═══════════════════════════════════════════════════════════ -->
  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <!-- ═══ PIED DE PAGE ══════════════════════════════════════════════════════ -->
  <footer class="app-footer">
    <div class="app-footer__inner">

      <div class="app-footer__brand">
        <span class="app-footer__mascot" aria-hidden="true"></span>
        <div class="app-footer__brand-text">
          <strong>PurpleForge Compagnon</strong>
          <span>Outil open-source de purple teaming &middot; Suite Outils Compagnon</span>
        </div>
      </div>

      <div class="app-footer__credit">
        Conçu &amp; développé par <strong>Yeni DOUKAKAS</strong>
      </div>

    </div>
  </footer>

</body>
</html>
